<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register | Mini Social</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body class="auth-body">

    <main class="auth-wrapper">

        <div class="auth-card">

            <div class="auth-header">

                <h1 class="auth-logo">Mini Social</h1>

                <h2>Create Account</h2>

                <p>Join the community and start sharing your moments.</p>

            </div>

            <form
                id="registerForm"
                class="auth-form">

                <input
                    type="text"
                    id="name"
                    class="auth-input"
                    placeholder="Full Name"
                    required>

                <input
                    type="text"
                    id="username"
                    class="auth-input"
                    placeholder="Username"
                    required>

                <input
                    type="email"
                    id="email"
                    class="auth-input"
                    placeholder="Email Address"
                    required>

                <input
                    type="password"
                    id="password"
                    class="auth-input"
                    placeholder="Password"
                    required>

                <button
                    type="submit"
                    class="primary-btn">

                    Create Account

                </button>

            </form>

            <p class="auth-footer">

                Already have an account?

                <a href="login.html">
                    Login
                </a>

            </p>

        </div>

    </main>

    <script src="js/register.js"></script>

</body>

</html>
