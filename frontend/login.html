<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | Mini Social</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body class="auth-body">

    <main class="auth-wrapper">

        <div class="auth-card">

            <div class="auth-header">

                <h1 class="auth-logo">Mini Social</h1>

                <h2>Welcome Back</h2>

                <p>Login to continue sharing your moments.</p>

            </div>

            <form
                id="loginForm"
                class="auth-form">

                <input
                    type="email"
                    id="email"
                    class="auth-input"
                    placeholder="Email Address"
                    required>

                <input
                    type="password"
                    id="password"
                    class="auth-input"
                    placeholder="Password"
                    required>

                <button
                    type="submit"
                    class="primary-btn">

                    Login

                </button>

            </form>

            <p class="auth-footer">

                Don't have an account?

                <a href="register.html">

                    Create Account

                </a>

            </p>

        </div>

    </main>

    <script src="js/login.js"></script>

</body>

</html>
